<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список покупок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Список покупок</h1>
        
        <div id="toast" class="toast" aria-live="polite"></div>

        <form id="add-form" class="add-form">
            <div class="form-row">
                <input type="date" id="item-date" class="date-input">
                <input type="text" id="item-name" placeholder="Товар" maxlength="30" autocomplete="off" size="10">
                <input type="number" id="item-qty" placeholder="Кол-во" min="1" value="1">
                <select id="item-unit" class="unit-select">
                    <option value="шт">шт</option>
                    <option value="кг">кг</option>
                    <option value="г">г</option>
                    <option value="л">л</option>
                    <option value="мл">мл</option>
                    <option value="уп">уп</option>
                    <option value="пач">пач</option>
                </select>
                <button type="submit" class="btn btn-add">Добавить</button>
            </div>
        </form>

        <div id="shopping-list" class="shopping-list"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
